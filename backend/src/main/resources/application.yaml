spring:
  application:
    name: planplus

  datasource:
    url: jdbc:postgresql://localhost:5432/planplus_db
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:default_password}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

server:
  port: 8080

# JWT konfiguracija
jwt:
  secret: ${JWT_SECRET:CHANGE_ME_IN_LOCAL_YAML_MINIMUM_256_BITS_BASE64}
  expiration-ms: 86400000  # 24 sata

# Bootstrap admin nalog (kreira se pri prvom pokretanju ako nema korisnika)
app:
  admin:
    username: ${APP_ADMIN_USERNAME:admin}
    password: ${APP_ADMIN_PASSWORD:admin123}
    first-name: System
    last-name: Administrator