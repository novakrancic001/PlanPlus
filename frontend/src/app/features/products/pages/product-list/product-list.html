<div class="page">

  <h2 class="page-title">Proizvodi</h2>

  <div class="card form-card">
    <h3>Dodaj novi proizvod</h3>

    <form [formGroup]="productForm" (ngSubmit)="onSubmit()">

      <div class="form-row">
        <div class="form-group">
          <label>SKU</label>
          <input type="text" formControlName="sku" placeholder="npr. BIC-001" />
        </div>

        <div class="form-group">
          <label>Naziv</label>
          <input type="text" formControlName="name" placeholder="npr. Bicikl" />
        </div>

        <div class="form-group">
          <label>Jedinica mere</label>
          <select formControlName="unit">
            <option value="PCS">PCS - komad</option>
            <option value="KG">KG - kilogram</option>
            <option value="M">M - metar</option>
            <option value="L">L - litar</option>
          </select>
        </div>

        <div class="form-group">
          <label>Opis</label>
          <input type="text" formControlName="description" placeholder="Opciono" />
        </div>
      </div>

      <div *ngIf="errorMessage" class="error-message">
        {{ errorMessage }}
      </div>

      <button type="submit" [disabled]="productForm.invalid">
        Dodaj proizvod
      </button>

    </form>
  </div>

  <div class="card">
    <div *ngIf="isLoading">Ucitavanje...</div>

    <table *ngIf="!isLoading">
      <thead>
        <tr>
          <th>SKU</th>
          <th>Naziv</th>
          <th>Opis</th>
          <th>Jedinica</th>
          <th></th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let product of products">
          <td>{{ product.sku }}</td>
          <td>{{ product.name }}</td>
          <td>{{ product.description || '-' }}</td>
          <td>{{ product.unit }}</td>
          <td>
            <a [routerLink]="['/products', product.id]" class="btn-detail">
              Detalji
            </a>
          </td>
        </tr>
        <tr *ngIf="products.length === 0">
          <td colspan="4">Nema proizvoda u bazi.</td>
        </tr>
      </tbody>
    </table>
  </div>

</div>
