<div class="page">

  <h2 class="page-title">Radni nalozi</h2>

  <div class="card form-card">
    <h3>Kreiraj novi nalog</h3>

    <form [formGroup]="orderForm" (ngSubmit)="onSubmit()">
      <div class="form-row">

        <div class="form-group">
          <label>Proizvod</label>
          <select formControlName="productId">
            <option [value]="null" disabled>Izaberi proizvod</option>
            <option *ngFor="let p of products" [value]="p.id">
              {{ p.name }} ({{ p.sku }})
            </option>
          </select>
        </div>

        <div class="form-group">
          <label>Količina</label>
          <input type="number" formControlName="quantity" placeholder="npr. 10" min="0.01" step="0.01" />
        </div>

      </div>

      <div *ngIf="errorMessage" class="error-message">
        {{ errorMessage }}
      </div>

      <button type="submit" [disabled]="orderForm.invalid">
        Kreiraj nalog
      </button>

    </form>
  </div>

  <div class="card">
    <div *ngIf="isLoading">Ucitavanje...</div>

    <table *ngIf="!isLoading">
      <thead>
        <tr>
          <th>Proizvod</th>
          <th>SKU</th>
          <th>Količina</th>
          <th>Status</th>
          <th>Kreirano</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let order of workOrders">
          <td>{{ order.product.name }}</td>
          <td>{{ order.product.sku }}</td>
          <td>{{ order.quantity }}</td>
          <td>
            <span [class]="'status-badge ' + statusClass(order.status)">
              {{ statusLabel(order.status) }}
            </span>
          </td>
          <td>{{ order.createdAt | date:'dd.MM.yyyy HH:mm' }}</td>
        </tr>
        <tr *ngIf="workOrders.length === 0">
          <td colspan="5">Nema radnih naloga.</td>
        </tr>
      </tbody>
    </table>
  </div>

</div>
