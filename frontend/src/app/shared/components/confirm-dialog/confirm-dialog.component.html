<div class="overlay">
  <div class="dialog">
    <h3>{{ title }}</h3>
    <p>{{ message }}</p>
    <div class="actions">
      <button class="btn-cancel" (click)="cancelled.emit()">Odustani</button>
      <button class="btn-confirm" (click)="confirmed.emit()">{{ confirmLabel }}</button>
    </div>
  </div>
</div>
